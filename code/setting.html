<!DOCTYPE html>
<html lang="en" class="h-full bg-stone-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid RAG | Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Space Grotesk', 'sans-serif'] }, colors: { brand: '#f97316' } } } };
    function saveSettings(e){e.preventDefault(); const n=document.getElementById('saved'); n.classList.remove('hidden'); setTimeout(()=>n.classList.add('hidden'),1600);}
  </script>
  <link rel="stylesheet" href="site.css" />
  <script src="site.js" defer></script>
</head>
<body class="app-shell h-full font-sans text-stone-100 bg-[#0c0c0c]">
  <main class="mx-auto max-w-5xl px-6 py-8">
    <div class="mb-8">
      <a href="dashboard.html" class="text-sm text-stone-400 transition hover:text-brand">Back to Dashboard</a>
      <h1 class="mt-2 bg-gradient-to-r from-white to-orange-200 bg-clip-text text-3xl font-bold text-transparent">Settings</h1>
      <p class="mt-1 text-sm text-stone-400">Manage your account preferences and workspace configuration</p>
    </div>

    <form onsubmit="saveSettings(event)" class="space-y-6 rounded-xl border border-white/10 bg-gradient-to-br from-stone-800/30 to-stone-900/50 p-6">
      <fieldset class="grid gap-4 sm:grid-cols-2">
        <legend class="col-span-full mb-2 text-lg font-semibold">Profile</legend>
        <label class="text-sm font-medium">
          Full name
          <input class="mt-2 w-full rounded-lg border border-white/15 bg-black/40 px-3 py-2 text-sm outline-none transition focus:border-brand focus:shadow-lg focus:shadow-brand/10" value="Alexander Wright" />
        </label>
        <label class="text-sm font-medium">
          Email
          <input class="mt-2 w-full rounded-lg border border-white/15 bg-black/40 px-3 py-2 text-sm outline-none transition focus:border-brand focus:shadow-lg focus:shadow-brand/10" value="alexander@hybridrag.ai" />
        </label>
      </fieldset>

      <fieldset class="border-t border-white/10 pt-6">
        <legend class="mb-3 text-lg font-semibold">Preferences</legend>
        <label class="text-sm font-medium">
          Model preference
          <select class="mt-2 w-full rounded-lg border border-white/15 bg-black/40 px-3 py-2 text-sm outline-none transition focus:border-brand focus:shadow-lg focus:shadow-brand/10">
            <option>GPT-4o</option>
            <option>Claude Sonnet</option>
            <option>Llama 3.1</option>
          </select>
        </label>
      </fieldset>

      <div class="flex flex-wrap items-center gap-3 border-t border-white/10 pt-6">
        <button type="submit" class="rounded-lg bg-gradient-to-r from-brand to-orange-500 px-4 py-2 font-semibold text-black shadow-lg shadow-brand/20 transition hover:shadow-xl">Save Settings</button>
        <a href="dashboard.html" class="rounded-lg border border-white/20 px-4 py-2 font-medium transition hover:border-brand hover:bg-brand/5">Cancel</a>
      </div>
      <p id="saved" class="hidden text-sm font-medium text-emerald-400">✔ Settings saved successfully.</p>
    </form>
  </main>
</body>
</html>
