<!DOCTYPE html>
<html lang="en" class="h-full bg-stone-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid RAG | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Space Grotesk', 'sans-serif'] }, colors: { brand: '#f97316' } } } };
    function loginDemo(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const note = document.getElementById('note');
      if (!email || !password) {
        note.textContent = 'Please enter email and password.';
        note.className = 'mt-4 text-sm text-red-400';
        return;
      }
      note.textContent = 'Signed in. Redirecting to dashboard...';
      note.className = 'mt-4 text-sm text-emerald-400';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
    }
  </script>
  <link rel="stylesheet" href="site.css" />
  <script src="site.js" defer></script>
</head>
<body class="app-shell h-full font-sans text-stone-100 bg-[radial-gradient(circle_at_top,#3f1d0f,transparent_40%),#0c0c0c]">
  <main class="mx-auto flex min-h-full max-w-5xl items-center px-6 py-16">
    <section class="grid w-full gap-8 rounded-2xl border border-white/10 bg-gradient-to-br from-stone-800/30 to-stone-900/50 p-8 shadow-2xl shadow-brand/10 backdrop-blur md:grid-cols-2">
      <div>
        <a href="landingpage.html" class="text-sm text-stone-300 transition hover:text-brand">← Back to Home</a>
        <h1 class="mt-4 bg-gradient-to-r from-white to-orange-200 bg-clip-text text-4xl font-bold text-transparent">Welcome back</h1>
        <p class="mt-3 leading-relaxed text-stone-300">Access your assistant workspace, document insights, and team knowledge channels.</p>
        <div class="mt-8 space-y-3 text-sm text-stone-300">
          <p><a href="pricing.html" class="font-medium transition hover:text-brand">View plans →</a></p>
          <p><a href="support.html" class="font-medium transition hover:text-brand">Contact support →</a></p>
        </div>
      </div>
      <form onsubmit="loginDemo(event)" class="rounded-xl border border-white/10 bg-stone-800/30 p-6">
        <label for="email" class="mb-2 block text-sm font-medium">Email</label>
        <input id="email" type="email" class="mb-4 w-full rounded-lg border border-white/15 bg-black/40 px-3 py-2 text-sm outline-none transition focus:border-brand focus:shadow-lg focus:shadow-brand/10" placeholder="name@company.com" />
        <label for="password" class="mb-2 block text-sm font-medium">Password</label>
        <input id="password" type="password" class="mb-4 w-full rounded-lg border border-white/15 bg-black/40 px-3 py-2 text-sm outline-none transition focus:border-brand focus:shadow-lg focus:shadow-brand/10" placeholder="••••••••" />
        <button type="submit" class="mt-5 w-full rounded-lg bg-gradient-to-r from-brand to-orange-500 px-4 py-2 font-semibold text-black shadow-lg shadow-brand/20 transition hover:shadow-xl">Sign In</button>
        <a href="dashboard.html" class="mt-3 block text-center text-sm font-medium text-white/70 transition hover:text-brand">Continue as demo user</a>
        <p class="mt-4 border-t border-white/10 pt-4 text-center text-sm text-stone-400">Don't have an account? <a href="signup.html" class="font-semibold text-brand transition hover:text-orange-400">Sign up</a></p>
        <p id="note" class="mt-4 text-sm text-stone-400">✓ Use any credentials to continue in demo mode.</p>
      </form>
    </section>
  </main>
</body>
</html>
