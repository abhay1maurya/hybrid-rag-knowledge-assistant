<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid RAG | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="loginpage.css" />
  <script src="loginpage.js" defer></script>
</head>
<body>
  <main class="main-container">
    <section class="login-card">
      <div class="login-info">
        <a href="landingpage.html" class="link-back">← Back to Home</a>
        <h1 class="gradient-heading">Welcome back</h1>
        <p class="description">Access your assistant workspace, document insights, and team knowledge channels.</p>
        <div class="links-group">
          <p><a href="pricinglagacy.html" class="link-hover">View plans →</a></p>
          <p><a href="support.html" class="link-hover">Contact support →</a></p>
        </div>
      </div>
      
      <form onsubmit="loginDemo(event)" class="login-form">
        <label for="email" class="form-label">Email</label>
        <input id="email" type="email" class="form-input" placeholder="name@company.com" />
        
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" class="form-input" placeholder="••••••••" />
        
        <button type="submit" class="btn-primary">Sign In</button>
        <a href="dashboard.html" class="link-demo">Continue as demo user</a>
        
        <p class="signup-text">
          Don't have an account? <a href="signup.html" class="link-brand">Sign up</a>
        </p>
        <p id="note" class="note-text">✓ Use any credentials to continue in demo mode.</p>
      </form>
    </section>
  </main>
</body>
</html>
